services:
  parsedmarc:
    build: ./parsedmarc/
    volumes:
      - ./files:/input
      - ./processed:/input/processed
      - ./output_files:/output
    command: /run.sh
    depends_on:
      elasticsearch:
        condition: service_healthy   # Wait until ES passes its healthcheck
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.1
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false   # ES 8+ enables TLS+auth by default; disable for internal use
    volumes:
      - ./elastic_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -c '\"status\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  grafana:
    build: ./grafana/
    ports:
      - 3000:3000
    user: root
    environment:
      GF_INSTALL_PLUGINS: grafana-piechart-panel,grafana-worldmap-panel
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
    depends_on:
      elasticsearch:
        condition: service_healthy   # Grafana also needs ES up before it loads dashboards

  gdrive-poller:
    build: ./gdrive_poller/
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./files:/input
      - ./processed:/input/processed
      - ./gdrive_state:/state
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy